<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>NavESP</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1a;--surface:#0e1625;--surface2:#141e2e;--surface3:#1a2640;
  --border:#1d2d45;--accent:#00cfff;--accent2:#0066ff;
  --green:#00e676;--amber:#ffb300;--red:#ff3d3d;
  --text:#dce8f5;--muted:#4a6080;--radius:14px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,'Segoe UI',system-ui,sans-serif;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;min-height:100dvh}

/* ── HEADER ─────────────────────────────────────────────── */
header{
  background:linear-gradient(135deg,#08112a 0%,#0c1b3a 100%);
  border-bottom:1px solid var(--border);
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.ble-badge{display:flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.err{background:var(--red)}
/* speed pill */
.speed-pill{background:var(--surface3);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;
  color:var(--amber);display:none}
.speed-pill.show{display:block}

/* ── MAIN ────────────────────────────────────────────────── */
main{flex:1;padding:13px;display:flex;flex-direction:column;gap:11px;
  max-width:480px;margin:0 auto;width:100%}

/* ── CARDS ──────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:15px;box-shadow:var(--shadow)}
.card-title{font-size:10px;font-weight:700;letter-spacing:.9px;
  text-transform:uppercase;color:var(--muted);margin-bottom:11px;
  display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:13px;
  background:var(--accent);border-radius:2px;display:block}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{padding:13px 18px;border-radius:12px;border:none;cursor:pointer;
  font-size:14px;font-weight:600;transition:transform .15s,opacity .15s;width:100%;
  display:flex;align-items:center;justify-content:center;gap:8px;line-height:1}
.btn-ble{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.btn-dis{background:linear-gradient(135deg,#7a0000,var(--red));color:#fff}
.btn-nav{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.btn-nav:disabled{opacity:.35;pointer-events:none}
.btn-stop{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-test{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  flex:1;padding:9px 6px;font-size:12px;border-radius:10px}
.btn:active{transform:scale(.96);opacity:.85}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── INPUTS ──────────────────────────────────────────────── */
input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;
  outline:none;-webkit-appearance:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

.suggestions{margin-top:5px;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none}
.suggestions.show{display:block}
.sug-item{padding:11px 13px;font-size:14px;cursor:pointer;
  border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.sug-item:last-child{border-bottom:none}
.sug-item:active{background:var(--surface3)}
.sug-main{color:var(--text)}
.sug-sub{font-size:11px;color:var(--muted)}

/* ── GPS ──────────────────────────────────────────────────── */
.gps-row{display:flex;align-items:center;gap:10px}
.gps-icon{width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,#082218,#0a3020);
  border:1px solid #0a4a2a;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.gps-info{flex:1;min-width:0}
.gps-coords{font-size:11.5px;font-family:monospace;color:var(--green);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gps-acc{font-size:11px;color:var(--muted);margin-top:2px}
.gps-btn{flex-shrink:0;padding:8px 13px;border-radius:10px;border:none;
  cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s}
.gps-btn:active{opacity:.7}
.gps-on{background:var(--green);color:#000}
.gps-off{background:var(--red);color:#fff}

/* ── ROUTE BOX ───────────────────────────────────────────── */
.route-box{display:none;background:linear-gradient(135deg,#081922,#0b2535);
  border:1px solid #154060;border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow)}
.route-box.show{display:block}
.route-meta{display:flex;gap:8px;margin-bottom:12px}
.r-chip{flex:1;text-align:center;background:#081d2d;
  border:1px solid #154060;border-radius:10px;padding:9px 4px}
.r-chip .v{font-size:16px;font-weight:700;color:var(--accent)}
.r-chip .l{font-size:10px;color:var(--muted);margin-top:2px}

/* ── STEP BOX ────────────────────────────────────────────── */
.step-box{background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;padding:13px;display:flex;align-items:center;gap:12px}
.step-arr{font-size:34px;flex-shrink:0;line-height:1}
.step-info{flex:1;min-width:0}
.step-dist{font-size:24px;font-weight:700;color:var(--amber);line-height:1.1}
.step-street{font-size:13px;color:var(--text);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-next{font-size:11px;color:var(--muted);margin-top:3px}
.step-eta{font-size:11px;color:var(--green);margin-top:4px}

/* ── REROUTE BANNER ───────────────────────────────────────── */
.reroute-banner{display:none;background:linear-gradient(135deg,#2a1500,#3d2000);
  border:1px solid #7a4000;border-radius:10px;padding:10px 13px;
  font-size:12px;color:var(--amber);text-align:center;margin-top:8px;
  animation:pulse 1s ease-in-out infinite alternate}
.reroute-banner.show{display:block}
@keyframes pulse{from{opacity:.7}to{opacity:1}}

/* ── TEST ROW ─────────────────────────────────────────────── */
.test-row{display:flex;gap:5px;flex-wrap:wrap}

/* ── TOAST ───────────────────────────────────────────────── */
.toast-wrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);
  z-index:999;width:calc(100% - 24px);max-width:380px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;margin-bottom:7px;font-size:13px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;
  animation:tin .2s ease;pointer-events:auto}
.toast.ok{border-color:var(--green)}
.toast.err{border-color:var(--red)}
.toast.info{border-color:var(--accent)}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

/* ── OVERLAY ──────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(7,13,26,.88);
  display:none;align-items:center;justify-content:center;
  z-index:100;flex-direction:column;gap:14px;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.spin{width:38px;height:38px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-txt{font-size:14px;color:var(--muted)}

.note{font-size:11px;color:var(--muted);text-align:center;
  padding:7px 8px;line-height:1.6;margin-top:4px}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-icon">🧭</div>
    <div class="logo-text">Nav<span>ESP</span></div>
  </div>
  <div class="header-right">
    <div class="speed-pill" id="speedPill">0 km/h</div>
    <div class="ble-badge">
      <div class="dot" id="bleDot"></div>
      <span id="bleStatus">Chưa kết nối</span>
    </div>
  </div>
</header>

<main>

  <!-- KẾT NỐI BLE -->
  <div class="card">
    <div class="card-title">Bluetooth BLE</div>
    <button class="btn btn-ble" id="connectBtn" onclick="connectBLE()">
      🔵 Kết nối NavESP
    </button>
    <button class="btn btn-dis" id="disconnectBtn" onclick="disconnectBLE()"
      style="margin-top:8px;display:none">
      ✕ Ngắt kết nối
    </button>
    <div class="note" id="bleNote">Dùng Chrome trên Android. Bật Bluetooth trước.</div>
  </div>

  <!-- TEST NHANH — chỉ hiện khi kết nối -->
  <div class="card" id="testCard" style="display:none">
    <div class="card-title">Test nhanh</div>
    <div class="test-row">
      <button class="btn btn-test" onclick="testSend('STRAIGHT',350,'Vo Van Tan','Nguyen Hue','5 phut',3)">⬆️ Thẳng</button>
      <button class="btn btn-test" onclick="testSend('LEFT',150,'Nguyen Hue','Le Loi','4 phut',2)">↰ Trái</button>
      <button class="btn btn-test" onclick="testSend('RIGHT',80,'Le Loi','Nam Ky','2 phut',1)">↱ Phải</button>
      <button class="btn btn-test" onclick="testSend('UTURN',200,'CMT8','Ly Tu Trong','6 phut',2)">↩️ U-turn</button>
      <button class="btn btn-test" onclick="testSend('ARRIVE',0,'Ben Thanh','','0 phut',0)">✅ Đến nơi</button>
      <button class="btn btn-test" onclick="testSend('WAIT',0,'','','',0)">⏳ Chờ</button>
    </div>
  </div>

  <!-- GPS -->
  <div class="card">
    <div class="card-title">Vị trí GPS</div>
    <div class="gps-row">
      <div class="gps-icon">📡</div>
      <div class="gps-info">
        <div class="gps-coords" id="gpsCoords">Chưa có vị trí</div>
        <div class="gps-acc" id="gpsAcc">Nhấn "Bật GPS"</div>
      </div>
      <button class="gps-btn gps-on" id="gpsBtn" onclick="toggleGps()">Bật GPS</button>
    </div>
  </div>

  <!-- ĐIỂM ĐẾN -->
  <div class="card">
    <div class="card-title">Điểm đến</div>
    <input type="text" id="destInput" placeholder="Nhập địa điểm hoặc tên đường..."
      oninput="onDestInput(this.value)" autocomplete="off" autocorrect="off"/>
    <div class="suggestions" id="suggestions"></div>
    <button class="btn btn-nav" id="startBtn" onclick="startNav()"
      style="margin-top:10px" disabled>
      🗺 Bắt đầu dẫn đường
    </button>
  </div>

  <!-- ROUTE INFO -->
  <div class="route-box" id="routeBox">
    <div class="route-meta">
      <div class="r-chip"><div class="v" id="rDist">—</div><div class="l">Quãng đường</div></div>
      <div class="r-chip"><div class="v" id="rTime">—</div><div class="l">Thời gian</div></div>
      <div class="r-chip"><div class="v" id="rSteps">—</div><div class="l">Lượt rẽ</div></div>
    </div>
    <div class="step-box">
      <div class="step-arr" id="sArr">⬆️</div>
      <div class="step-info">
        <div class="step-dist"   id="sDist">—</div>
        <div class="step-street" id="sStreet">Đang tính...</div>
        <div class="step-next"   id="sNext"></div>
        <div class="step-eta"    id="sEta"></div>
      </div>
    </div>
    <div class="reroute-banner" id="rerouteBanner">
      ⚠️ Lệch đường — đang tính lại lộ trình...
    </div>
    <button class="btn btn-stop" style="margin-top:10px" onclick="stopNav()">
      ⏹ Dừng dẫn đường
    </button>
  </div>

</main>
</div>

<div class="overlay" id="overlay">
  <div class="spin"></div>
  <div class="spin-txt" id="overlayTxt">Đang xử lý...</div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG — phải khớp config.h
// ════════════════════════════════════════════════════════════
const SVC_UUID    = '12345678-1234-1234-1234-123456789abc';
const NAV_UUID    = '12345678-1234-1234-1234-123456789abd';
const STATUS_UUID = '12345678-1234-1234-1234-123456789abe';

const MOTORBIKE_FACTOR = 1.5;   // OSRM tính xe hơi → nhân hệ số xe máy
const ARRIVE_M         = 30;    // m — khoảng cách coi là đã đến
const REROUTE_M        = 150;   // m — lệch > giá trị này → reroute
const UPDATE_INTERVAL  = 2000;  // ms — tần suất update vị trí

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let bleDevice    = null;
let bleServer    = null;
let navChar      = null;
let statusChar   = null;
let gpsWatcher   = null;
let userPos      = null;       // { lat, lng, acc, speed }
let prevUserPos  = null;       // để phát hiện dirty GPS
let selectedDest = null;
let isNavigating = false;
let sendTimer    = null;
let allSteps     = [];
let currentStep  = 0;
let acTimer      = null;
let smoothDist   = null;
let rerouteTimer = null;
let autoReconnect= true;       // bật auto-reconnect

// ════════════════════════════════════════════════════════════
//  BỎ DẤU TIẾNG VIỆT
// ════════════════════════════════════════════════════════════
function removeDiacritics(str) {
  if (!str) return '';
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
            .replace(/đ/g,'d').replace(/Đ/g,'D');
}

// ════════════════════════════════════════════════════════════
//  BLE — KẾT NỐI
// ════════════════════════════════════════════════════════════
async function connectBLE() {
  if (!navigator.bluetooth) {
    toast('Trình duyệt không hỗ trợ BLE. Dùng Chrome Android!', 'err'); return;
  }
  showOverlay('Đang tìm NavESP...');
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'NavESP' }],
      optionalServices: [SVC_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onBleDisconnect);
    await doConnect();
  } catch(e) {
    if (e.name !== 'NotFoundError') toast('Lỗi BLE: ' + e.message, 'err');
  } finally { hideOverlay(); }
}

async function doConnect() {
  showOverlay('Đang kết nối...');
  try {
    bleServer  = await bleDevice.gatt.connect();
    const svc  = await bleServer.getPrimaryService(SVC_UUID);
    navChar    = await svc.getCharacteristic(NAV_UUID);
    statusChar = await svc.getCharacteristic(STATUS_UUID);
    await statusChar.startNotifications();
    statusChar.addEventListener('characteristicvaluechanged', onStatusNotify);
    setBleUI(true);
    toast('✅ Đã kết nối NavESP!', 'ok');
  } catch(e) {
    toast('Kết nối thất bại: ' + e.message, 'err');
  } finally { hideOverlay(); }
}

function onBleDisconnect() {
  setBleUI(false);
  navChar = null; statusChar = null;
  toast('Mất kết nối BLE', 'err');
  if (isNavigating) stopNav();
  // Auto-reconnect
  if (autoReconnect && bleDevice) {
    setTimeout(async () => {
      if (!navChar) { await doConnect(); }
    }, 3000);
  }
}

async function disconnectBLE() {
  autoReconnect = false;
  if (bleDevice?.gatt?.connected) bleDevice.gatt.disconnect();
  setBleUI(false);
  autoReconnect = true;
}

function onStatusNotify(e) {
  console.log('[status]', new TextDecoder().decode(e.target.value));
}

function setBleUI(connected) {
  document.getElementById('bleDot').className        = 'dot ' + (connected ? 'on' : 'err');
  document.getElementById('bleStatus').textContent   = connected ? 'NavESP' : 'Chưa kết nối';
  document.getElementById('connectBtn').style.display    = connected ? 'none' : 'flex';
  document.getElementById('disconnectBtn').style.display = connected ? 'flex' : 'none';
  document.getElementById('testCard').style.display      = connected ? 'block' : 'none';
  document.getElementById('bleNote').textContent = connected
    ? '✅ ESP32 sẵn sàng nhận lệnh' : 'Dùng Chrome trên Android. Bật Bluetooth trước.';
  updateStartBtn();
}

// ════════════════════════════════════════════════════════════
//  GỬI LỆNH QUA BLE
// ════════════════════════════════════════════════════════════
async function sendNav(payload) {
  if (!navChar) return;
  const clean = {
    dir:    payload.dir,
    dist:   payload.dist,
    street: removeDiacritics(payload.street || ''),
    next:   removeDiacritics(payload.next   || ''),
    eta:    removeDiacritics(payload.eta    || ''),
    turns:  payload.turns || 0
  };
  try {
    const enc = new TextEncoder().encode(JSON.stringify(clean));
    await navChar.writeValueWithoutResponse(enc);
  } catch(e) {
    toast('Lỗi gửi: ' + e.message, 'err');
  }
}

function testSend(dir, dist, street, next, eta, turns) {
  const p = { dir, dist, street, next, eta, turns };
  sendNav(p); updateStepUI(p);
  toast('Gửi: ' + dir, 'info');
}

// ════════════════════════════════════════════════════════════
//  GPS
// ════════════════════════════════════════════════════════════
function toggleGps() {
  if (gpsWatcher) {
    navigator.geolocation.clearWatch(gpsWatcher);
    gpsWatcher = null;
    document.getElementById('gpsBtn').className   = 'gps-btn gps-on';
    document.getElementById('gpsBtn').textContent = 'Bật GPS';
    document.getElementById('gpsAcc').textContent = 'Đã tắt GPS';
    document.getElementById('speedPill').classList.remove('show');
    return;
  }
  if (!navigator.geolocation) { toast('Không hỗ trợ GPS','err'); return; }
  gpsWatcher = navigator.geolocation.watchPosition(onGps, onGpsErr,
    { enableHighAccuracy:true, maximumAge:2000, timeout:10000 });
  document.getElementById('gpsBtn').className   = 'gps-btn gps-off';
  document.getElementById('gpsBtn').textContent = 'Tắt GPS';
}

function onGps(pos) {
  prevUserPos = userPos;
  userPos = {
    lat:   pos.coords.latitude,
    lng:   pos.coords.longitude,
    acc:   pos.coords.accuracy,
    speed: pos.coords.speed   // m/s, có thể null
  };
  document.getElementById('gpsCoords').textContent =
    `${userPos.lat.toFixed(6)}, ${userPos.lng.toFixed(6)}`;
  document.getElementById('gpsAcc').textContent = `±${Math.round(userPos.acc)}m`;

  // Hiện tốc độ
  if (userPos.speed != null && userPos.speed >= 0) {
    const kmh = (userPos.speed * 3.6).toFixed(0);
    const pill = document.getElementById('speedPill');
    pill.textContent = kmh + ' km/h';
    pill.classList.add('show');
  }
  updateStartBtn();
}
function onGpsErr(e) { toast('GPS lỗi: ' + e.message, 'err'); }

// ════════════════════════════════════════════════════════════
//  AUTOCOMPLETE — Nominatim với viewbox bias
// ════════════════════════════════════════════════════════════
function onDestInput(v) {
  selectedDest = null; updateStartBtn();
  clearTimeout(acTimer);
  if (v.length < 3) { hideSug(); return; }
  acTimer = setTimeout(() => fetchPlaces(v), 400);
}

async function fetchPlaces(q) {
  if (!userPos) { toast('Bật GPS trước để tìm địa điểm gần bạn','info'); return; }
  try {
    // viewbox quanh vị trí user (±0.3 độ ≈ ±33km)
    const d = 0.3;
    const vb = `${userPos.lng-d},${userPos.lat-d},${userPos.lng+d},${userPos.lat+d}`;
    const url = `https://nominatim.openstreetmap.org/search?` +
      `q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=vn` +
      `&viewbox=${vb}&bounded=0`;
    const r = await fetch(url, { headers: {'Accept-Language':'vi'} });
    showSug(await r.json());
  } catch { hideSug(); }
}

function showSug(places) {
  const el = document.getElementById('suggestions');
  if (!places.length) { hideSug(); return; }
  el.innerHTML = places.map(p => {
    const name = p.name || p.display_name.split(',')[0];
    const sub  = p.display_name.split(',').slice(1,3).join(',').trim();
    return `<div class="sug-item" onclick="selectDest(${p.lat},${p.lon},'${esc(name)}')">
      <div class="sug-main">${esc(name)}</div>
      <div class="sug-sub">${esc(sub)}</div></div>`;
  }).join('');
  el.classList.add('show');
}

function selectDest(lat, lng, name) {
  selectedDest = { lat:+lat, lng:+lng, name };
  document.getElementById('destInput').value = name;
  hideSug(); updateStartBtn();
  toast('Đã chọn: ' + name, 'ok');
}
function hideSug() { document.getElementById('suggestions').classList.remove('show'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;'); }
function updateStartBtn() {
  document.getElementById('startBtn').disabled = !(userPos && selectedDest && navChar && !isNavigating);
}

// ════════════════════════════════════════════════════════════
//  HAVERSINE
// ════════════════════════════════════════════════════════════
function haversine(la1,ln1,la2,ln2) {
  const R=6371000, d2r=Math.PI/180;
  const dLa=(la2-la1)*d2r, dLn=(ln2-ln1)*d2r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ════════════════════════════════════════════════════════════
//  PARSE HƯỚNG
// ════════════════════════════════════════════════════════════
function parseDir(maneuver) {
  if (!maneuver) return 'STRAIGHT';
  const m = maneuver.toLowerCase();
  if (m.includes('uturn'))  return 'UTURN';
  if (m.includes('left'))   return 'LEFT';
  if (m.includes('right'))  return 'RIGHT';
  return 'STRAIGHT';
}

function fmtMinutes(min) {
  min = Math.max(1, Math.round(min));
  if (min < 60) return min + ' phut';
  const h=Math.floor(min/60), m=min%60;
  return h+'h'+(m>0?' '+m+'p':'');
}

// ════════════════════════════════════════════════════════════
//  BẮT ĐẦU DẪN ĐƯỜNG
// ════════════════════════════════════════════════════════════
async function startNav() {
  if (!userPos || !selectedDest || !navChar) return;
  showOverlay('Đang tính lộ trình...');
  try {
    const r = await fetch(
      `https://router.project-osrm.org/route/v1/driving/` +
      `${userPos.lng},${userPos.lat};${selectedDest.lng},${selectedDest.lat}` +
      `?overview=false&steps=true`
    );
    const data = await r.json();
    if (data.code !== 'Ok') throw new Error('Không tính được lộ trình');

    allSteps    = data.routes[0].legs[0].steps;
    currentStep = 0;
    smoothDist  = null;
    const totalMin = data.routes[0].duration / 60 * MOTORBIKE_FACTOR;

    document.getElementById('rDist').textContent  = (data.routes[0].distance/1000).toFixed(1)+'km';
    document.getElementById('rTime').textContent  = fmtMinutes(totalMin);
    document.getElementById('rSteps').textContent = allSteps.length;
    document.getElementById('routeBox').classList.add('show');

    isNavigating = true;
    updateStartBtn();
    toast('🚀 Bắt đầu đến ' + selectedDest.name, 'ok');

    sendStep(0);
    sendTimer = setInterval(updateLocation, UPDATE_INTERVAL);

  } catch(e) {
    toast('Lỗi routing: ' + e.message, 'err');
  } finally {
    hideOverlay();
  }
}

// ─── ETA còn lại từ step idx ──────────────────────────────────
function remainingEtaMin(idx) {
  let sec = 0;
  for (let i = idx; i < allSteps.length; i++) sec += allSteps[i].duration || 0;
  return sec / 60 * MOTORBIKE_FACTOR;
}

function sendStep(idx) {
  if (!allSteps.length) return;
  const step = allSteps[idx];
  const next = allSteps[idx+1];
  const dir  = parseDir(step.maneuver?.type || 'straight');

  const rawDist = haversine(
    userPos.lat, userPos.lng,
    step.maneuver.location[1], step.maneuver.location[0]
  );
  // EMA smoothing
  if (smoothDist===null || dir !== sendStep._lastDir) {
    smoothDist = rawDist;
  } else {
    smoothDist = smoothDist * 0.6 + rawDist * 0.4;
  }
  sendStep._lastDir = dir;
  const dist = Math.round(smoothDist);

  const etaMin   = remainingEtaMin(idx);
  const turnsLeft= allSteps.length - idx;

  const payload = {
    dir, dist,
    street: step.name || 'Duong chua co ten',
    next:   next ? (next.name || '') : '',
    eta:    fmtMinutes(etaMin),
    turns:  turnsLeft
  };

  // Kiểm tra đã đến nơi
  const dDest = haversine(userPos.lat,userPos.lng,selectedDest.lat,selectedDest.lng);
  if (dDest < ARRIVE_M) {
    Object.assign(payload,{ dir:'ARRIVE', dist:0, street:selectedDest.name, next:'', eta:'0 phut', turns:0 });
    clearInterval(sendTimer);
    toast('🎉 Đã đến nơi!', 'ok');
    isNavigating = false;
    document.getElementById('rerouteBanner').classList.remove('show');
  }

  sendNav(payload);
  updateStepUI(payload);
}

// ─── REROUTE khi lệch đường ────────────────────────────────
async function doReroute() {
  if (!isNavigating || !userPos) return;
  document.getElementById('rerouteBanner').classList.add('show');
  clearInterval(sendTimer);
  try {
    const r = await fetch(
      `https://router.project-osrm.org/route/v1/driving/` +
      `${userPos.lng},${userPos.lat};${selectedDest.lng},${selectedDest.lat}` +
      `?overview=false&steps=true`
    );
    const data = await r.json();
    if (data.code !== 'Ok') throw new Error();
    allSteps    = data.routes[0].legs[0].steps;
    currentStep = 0;
    smoothDist  = null;
    toast('🔄 Đã tính lại lộ trình', 'info');
  } catch {
    toast('Không tính lại được lộ trình', 'err');
  } finally {
    document.getElementById('rerouteBanner').classList.remove('show');
    sendTimer = setInterval(updateLocation, UPDATE_INTERVAL);
  }
}

const DIR_EMOJI = {STRAIGHT:'⬆️',LEFT:'↰',RIGHT:'↱',UTURN:'↩️',ARRIVE:'✅',WAIT:'⏳'};

function updateStepUI(payload) {
  document.getElementById('sArr').textContent    = DIR_EMOJI[payload.dir]||'⬆️';
  document.getElementById('sDist').textContent   = payload.dist>=1000
    ? (payload.dist/1000).toFixed(1)+'km' : payload.dist+'m';
  document.getElementById('sStreet').textContent = payload.street || '—';
  document.getElementById('sNext').textContent   = payload.next ? '→ '+payload.next : '';
  document.getElementById('sEta').textContent    = payload.eta
    ? `⏱ Còn ${payload.eta}${payload.turns?' • '+payload.turns+' lượt rẽ':''}` : '';
}

function updateLocation() {
  if (!userPos || !allSteps.length) return;

  // Tìm step gần nhất — tối đa nhìn trước 5 step (tránh O(n) lớn)
  let bestIdx=currentStep, bestD=Infinity;
  const lookAhead = Math.min(allSteps.length, currentStep + 5);
  for (let i=currentStep; i<lookAhead; i++) {
    const loc=allSteps[i].maneuver.location;
    const d=haversine(userPos.lat,userPos.lng,loc[1],loc[0]);
    if (d<bestD){ bestD=d; bestIdx=i; }
  }

  // Phát hiện lệch đường: khoảng cách đến step hiện tại > REROUTE_M
  // và GPS đã thực sự di chuyển (tránh false positive khi đứng yên)
  if (bestD > REROUTE_M && prevUserPos) {
    const moved = haversine(userPos.lat,userPos.lng,prevUserPos.lat,prevUserPos.lng);
    if (moved > 10 && !rerouteTimer) {
      rerouteTimer = setTimeout(() => { rerouteTimer=null; doReroute(); }, 4000);
    }
  } else {
    if (rerouteTimer) { clearTimeout(rerouteTimer); rerouteTimer=null; }
  }

  if (bestIdx !== currentStep) smoothDist = null;
  currentStep = bestIdx;
  sendStep(bestIdx);
}

function stopNav() {
  clearInterval(sendTimer);
  if (rerouteTimer) { clearTimeout(rerouteTimer); rerouteTimer=null; }
  isNavigating=false; allSteps=[]; currentStep=0; smoothDist=null;
  document.getElementById('routeBox').classList.remove('show');
  document.getElementById('rerouteBanner').classList.remove('show');
  updateStartBtn();
  sendNav({ dir:'WAIT', dist:0, street:'', next:'', eta:'', turns:0 });
  toast('Đã dừng dẫn đường', 'info');
}

// ════════════════════════════════════════════════════════════
//  TOAST & OVERLAY
// ════════════════════════════════════════════════════════════
function toast(msg, type='info') {
  const icons={ok:'✅',err:'❌',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toasts').prepend(el);
  setTimeout(()=>el.remove(),3500);
}
function showOverlay(txt){
  document.getElementById('overlayTxt').textContent=txt;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay(){ document.getElementById('overlay').classList.remove('show'); }

document.addEventListener('click', e=>{
  if (!e.target.closest('#suggestions') && !e.target.closest('#destInput')) hideSug();
});
</script>
